<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker Vinted</title>
    
    <!-- Tailwind CSS per la grafica -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (librerie base) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel (permettere al browser di leggere il codice React direttamente) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- ICONE SVG (Sostituiscono le icone lucide-react per funzionare senza Node.js) ---
        const PackageOpen = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22v-9"/><path d="M15.17 2.38a2 2 0 0 0-2.34 0l-7.38 5.46a2 2 0 0 0-.74 1.48v8.32a2 2 0 0 0 1.05 1.76l6.2 3.51a2 2 0 0 0 1.9 0l6.2-3.51a2 2 0 0 0 1.05-1.76V9.32a2 2 0 0 0-.74-1.48l-7.38-5.46Z"/><path d="M20 9.5 12 14 4 9.5"/><polyline points="7.5 5.5 12 8 16.5 5.5"/></svg>;
        const Package = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>;
        const ShoppingCart = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>;
        const TrendingUp = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>;
        const Trash2 = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
        const ArrowRightLeft = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/></svg>;

        function App() {
          // Stati per i dati (inizializzati dal localStorage se presente)
          const [purchases, setPurchases] = useState(() => {
            const saved = localStorage.getItem('vinted_purchases');
            return saved ? JSON.parse(saved) : [];
          });
          
          const [items, setItems] = useState(() => {
            const saved = localStorage.getItem('vinted_items');
            return saved ? JSON.parse(saved) : [];
          });

          // Stati dei form
          const [purchaseForm, setPurchaseForm] = useState({ desc: '', costN: '', costV: '', costFN: '', costFV: '' });
          const [itemForm, setItemForm] = useState({ desc: '', seller: 'Nessuno', price: '', status: 'Da listare' });

          // Sincronizza lo stato con il localStorage ogni volta che cambia
          useEffect(() => {
            localStorage.setItem('vinted_purchases', JSON.stringify(purchases));
          }, [purchases]);

          useEffect(() => {
            localStorage.setItem('vinted_items', JSON.stringify(items));
          }, [items]);

          // --- FUNZIONI DI SALVATAGGIO LOCALE ---
          const addPurchase = (e) => {
            e.preventDefault();
            if (!purchaseForm.desc) return;
            
            const newPurchase = {
              id: Date.now().toString(), // ID univoco
              desc: purchaseForm.desc,
              costN: parseFloat(purchaseForm.costN) || 0,
              costV: parseFloat(purchaseForm.costV) || 0,
              costFN: parseFloat(purchaseForm.costFN) || 0,
              costFV: parseFloat(purchaseForm.costFV) || 0,
              createdAt: Date.now()
            };
            
            setPurchases([newPurchase, ...purchases]);
            setPurchaseForm({ desc: '', costN: '', costV: '', costFN: '', costFV: '' });
          };

          const addItem = (e) => {
            e.preventDefault();
            if (!itemForm.desc) return;

            const newItem = {
              id: Date.now().toString(),
              desc: itemForm.desc,
              seller: itemForm.seller,
              price: parseFloat(itemForm.price) || 0,
              status: itemForm.status,
              createdAt: Date.now()
            };

            setItems([newItem, ...items]);
            setItemForm({ desc: '', seller: 'Nessuno', price: '', status: 'Da listare' });
          };

          const deletePurchase = (id) => {
            setPurchases(purchases.filter(p => p.id !== id));
          };

          const deleteItem = (id) => {
            setItems(items.filter(i => i.id !== id));
          };

          const updateItem = (id, field, value) => {
            setItems(items.map(item => 
              item.id === id 
                ? { ...item, [field]: field === 'price' ? (parseFloat(value) || 0) : value } 
                : item
            ));
          };

          // --- CALCOLI AUTOMATICI ---
          const stats = useMemo(() => {
            let totalCostN = 0; let totalCostV = 0; let totalCostFN = 0; let totalCostFV = 0;
            purchases.forEach(p => { 
              totalCostN += Number(p.costN) || 0; 
              totalCostV += Number(p.costV) || 0; 
              totalCostFN += Number(p.costFN) || 0;
              totalCostFV += Number(p.costFV) || 0;
            });
            const totalCostOutPocket = totalCostN + totalCostV;
            const totalCostFund = totalCostFN + totalCostFV;
            const totalCost = totalCostOutPocket + totalCostFund;

            let revenueN = 0; let revenueV = 0; let soldCount = 0;
            items.forEach(item => {
              if (item.status === 'Venduto') {
                const itemPrice = Number(item.price) || 0;
                if (item.seller === 'Nicolas') revenueN += itemPrice;
                else if (item.seller === 'Veronica') revenueV += itemPrice;
                soldCount++;
              }
            });
            const totalRevenue = revenueN + revenueV;
            const fondoDisponibile = totalRevenue - totalCostFund;
            const netProfit = totalRevenue - totalCost;
            
            const targetN = totalCostN + (netProfit / 2);
            const targetV = totalCostV + (netProfit / 2);

            // I soldi fisicamente in mano a ciascuno (Incassi Vinted - Quelli usati dal fondo per comprare nuovi pacchi)
            const heldN = revenueN - totalCostFN;
            const heldV = revenueV - totalCostFV;

            const balanceN = heldN - targetN;
            const balanceV = heldV - targetV;

            let settlementMsg = "Siete pari! ⚖️";
            let settlementColor = "bg-indigo-600 text-white";
            
            if (balanceN > 0.01) {
              settlementMsg = `Nicolas deve dare €${balanceN.toFixed(2)} a Veronica`;
              settlementColor = "bg-orange-100 text-orange-800 border border-orange-200";
            } else if (balanceV > 0.01) {
              settlementMsg = `Veronica deve dare €${balanceV.toFixed(2)} a Nicolas`;
              settlementColor = "bg-orange-100 text-orange-800 border border-orange-200";
            } else if (netProfit < 0) {
              settlementColor = "bg-red-100 text-red-800 border border-red-200";
              if (balanceN < -0.01) settlementMsg = `Veronica compensa Nicolas di €${Math.abs(balanceN).toFixed(2)}`;
              else if (balanceV < -0.01) settlementMsg = `Nicolas compensa Veronica di €${Math.abs(balanceV).toFixed(2)}`;
            } else {
               settlementColor = "bg-green-100 text-green-800 border border-green-200";
            }

            return { 
              totalCostN, totalCostV, totalCostOutPocket, totalCostFund, totalCost, 
              totalRevenue, fondoDisponibile, netProfit, soldCount, settlementMsg, settlementColor 
            };
          }, [purchases, items]);

          return (
            <div className="min-h-screen bg-gray-50 p-4 md:p-8 font-sans text-gray-800">
              <div className="max-w-7xl mx-auto space-y-6">
                
                {/* Header */}
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between flex-wrap gap-4">
                  <div className="flex items-center gap-3">
                    <PackageOpen className="w-8 h-8 text-indigo-600" />
                    <div>
                      <h1 className="text-2xl md:text-3xl font-extrabold text-indigo-600">Vinted Tracker</h1>
                      <p className="text-gray-500 mt-1 text-sm md:text-base">Nicolas & Veronica (Salvataggio Locale 💾 su GitHub)</p>
                    </div>
                  </div>
                </div>

                {/* Dashboard Statistiche */}
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                  <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex items-center gap-4">
                    <div className="p-3 bg-indigo-100 text-indigo-600 rounded-lg"><Package className="w-6 h-6" /></div>
                    <div>
                      <p className="text-sm text-gray-500 font-medium">Fondo Vinted</p>
                      <p className="text-xl font-bold text-indigo-700">€{stats.fondoDisponibile.toFixed(2)}</p>
                      <p className="text-xs text-gray-400">Totale incassi: €{stats.totalRevenue.toFixed(2)}</p>
                    </div>
                  </div>
                  
                  <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex items-center gap-4">
                    <div className="p-3 bg-red-100 text-red-600 rounded-lg"><ShoppingCart className="w-6 h-6" /></div>
                    <div>
                      <p className="text-sm text-gray-500 font-medium">Spesa (Di tasca vostra)</p>
                      <p className="text-xl font-bold">€{stats.totalCostOutPocket.toFixed(2)}</p>
                      <p className="text-xs text-gray-400">N: €{stats.totalCostN} | V: €{stats.totalCostV}</p>
                    </div>
                  </div>

                  <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex items-center gap-4">
                    <div className="p-3 bg-green-100 text-green-600 rounded-lg"><TrendingUp className="w-6 h-6" /></div>
                    <div>
                      <p className="text-sm text-gray-500 font-medium">Guadagno Netto</p>
                      <p className={`text-xl font-bold ${stats.netProfit >= 0 ? 'text-green-600' : 'text-red-500'}`}>
                        €{stats.netProfit.toFixed(2)}
                      </p>
                      <p className="text-xs text-gray-400">Incassi - Tutte le spese</p>
                    </div>
                  </div>

                  <div className={`p-5 rounded-xl shadow-sm flex flex-col justify-center ${stats.settlementColor}`}>
                    <div className="flex items-center gap-2 mb-1">
                      <ArrowRightLeft className="w-5 h-5 opacity-80" />
                      <p className="text-sm font-semibold opacity-90">Pareggio Conti</p>
                    </div>
                    <p className="text-lg font-bold leading-tight">{stats.settlementMsg}</p>
                  </div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                  
                  {/* SEZIONE 1: SPESE */}
                  <div className="space-y-4">
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                      <h2 className="text-lg font-bold mb-4 flex items-center gap-2 text-red-600">
                        <ShoppingCart className="w-5 h-5" /> 1. Acquisto Lotti (Uscite)
                      </h2>
                      <form onSubmit={addPurchase} className="space-y-4">
                        <input type="text" placeholder="Es. Bundle 3 pacchi o Pacco grande" value={purchaseForm.desc} onChange={(e) => setPurchaseForm({...purchaseForm, desc: e.target.value})} className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none" required />
                        
                        <div className="bg-gray-50 p-3 rounded-lg border border-gray-200">
                          <label className="text-xs font-semibold text-gray-600 uppercase tracking-wider mb-2 block">Pagato di tasca vostra (Nuovi soldi)</label>
                          <div className="flex gap-3">
                            <div className="w-1/2">
                              <label className="text-xs text-gray-500">Nicolas (€)</label>
                              <input type="number" step="0.01" value={purchaseForm.costN} onChange={(e) => setPurchaseForm({...purchaseForm, costN: e.target.value})} className="w-full p-2 border border-gray-300 rounded-lg outline-none" placeholder="0.00" />
                            </div>
                            <div className="w-1/2">
                              <label className="text-xs text-gray-500">Veronica (€)</label>
                              <input type="number" step="0.01" value={purchaseForm.costV} onChange={(e) => setPurchaseForm({...purchaseForm, costV: e.target.value})} className="w-full p-2 border border-gray-300 rounded-lg outline-none" placeholder="0.00" />
                            </div>
                          </div>
                        </div>

                        <div className="bg-indigo-50 p-3 rounded-lg border border-indigo-100">
                          <label className="text-xs font-semibold text-indigo-700 uppercase tracking-wider mb-2 block">Pagato dal Fondo Vinted</label>
                          <div className="flex gap-3">
                            <div className="w-1/2">
                              <label className="text-xs text-indigo-500">Saldo di Nicolas (€)</label>
                              <input type="number" step="0.01" value={purchaseForm.costFN} onChange={(e) => setPurchaseForm({...purchaseForm, costFN: e.target.value})} className="w-full p-2 border border-indigo-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-400" placeholder="0.00" />
                            </div>
                            <div className="w-1/2">
                              <label className="text-xs text-indigo-500">Saldo di Veronica (€)</label>
                              <input type="number" step="0.01" value={purchaseForm.costFV} onChange={(e) => setPurchaseForm({...purchaseForm, costFV: e.target.value})} className="w-full p-2 border border-indigo-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-400" placeholder="0.00" />
                            </div>
                          </div>
                        </div>

                        <button type="submit" className="w-full bg-red-50 text-red-600 font-semibold py-2 rounded-lg hover:bg-red-100 transition-colors border border-red-200">
                          + Aggiungi Spesa
                        </button>
                      </form>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                      <table className="w-full text-left">
                        <thead className="bg-gray-50 text-gray-500 text-xs uppercase">
                          <tr><th className="p-3 font-medium">Lotto Acquistato</th><th className="p-3 font-medium">Costo</th><th className="p-3 font-medium"></th></tr>
                        </thead>
                        <tbody className="divide-y divide-gray-100">
                          {purchases.map(p => {
                            const pocket = (Number(p.costN) || 0) + (Number(p.costV) || 0);
                            const fund = (Number(p.costFN) || 0) + (Number(p.costFV) || 0);
                            const total = pocket + fund;
                            return (
                              <tr key={p.id} className="hover:bg-gray-50">
                                <td className="p-3 font-medium text-sm">{p.desc}</td>
                                <td className="p-3 text-sm text-gray-600">
                                  <span className="font-bold">€{total.toFixed(2)}</span>
                                  <div className="text-xs text-gray-400 mt-1">
                                    {pocket > 0 && <span>Tasca: €{pocket} (N:€{p.costN||0} V:€{p.costV||0})</span>}
                                    {pocket > 0 && fund > 0 && <br/>}
                                    {fund > 0 && <span className="text-indigo-500">Fondo: €{fund} (N:€{p.costFN||0} V:€{p.costFV||0})</span>}
                                  </div>
                                </td>
                                <td className="p-3 text-right">
                                  <button onClick={() => deletePurchase(p.id)} className="text-gray-400 hover:text-red-500"><Trash2 className="w-4 h-4"/></button>
                                </td>
                              </tr>
                            );
                          })}
                          {purchases.length === 0 && <tr><td colSpan="3" className="p-4 text-center text-gray-500 text-sm">Nessun acquisto registrato</td></tr>}
                        </tbody>
                      </table>
                    </div>
                  </div>


                  {/* SEZIONE 2: INVENTARIO */}
                  <div className="space-y-4">
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                      <h2 className="text-lg font-bold mb-4 flex items-center gap-2 text-blue-600">
                        <Package className="w-5 h-5" /> 2. Articoli Trovati
                      </h2>
                      <form onSubmit={addItem} className="space-y-3">
                        <input type="text" placeholder="Es. T-shirt Nike" value={itemForm.desc} onChange={(e) => setItemForm({...itemForm, desc: e.target.value})} className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required />
                        <div className="flex gap-3">
                          <div className="w-1/3">
                            <label className="text-xs text-gray-500">Chi vende?</label>
                            <select value={itemForm.seller} onChange={(e) => setItemForm({...itemForm, seller: e.target.value})} className="w-full p-2 border border-gray-300 rounded-lg outline-none bg-white">
                              <option>Nessuno</option><option>Nicolas</option><option>Veronica</option>
                            </select>
                          </div>
                          <div className="w-1/3">
                            <label className="text-xs text-gray-500">Stato</label>
                            <select value={itemForm.status} onChange={(e) => setItemForm({...itemForm, status: e.target.value})} className="w-full p-2 border border-gray-300 rounded-lg outline-none bg-white">
                              <option>Da listare</option><option>In vendita</option><option>Venduto</option><option>Da buttare</option>
                            </select>
                          </div>
                          <div className="w-1/3">
                            <label className="text-xs text-gray-500">Prezzo (€)</label>
                            <input type="number" step="0.01" value={itemForm.price} onChange={(e) => setItemForm({...itemForm, price: e.target.value})} className="w-full p-2 border border-gray-300 rounded-lg outline-none" placeholder="0.00" />
                          </div>
                        </div>
                        <button type="submit" className="w-full bg-blue-50 text-blue-600 font-semibold py-2 rounded-lg hover:bg-blue-100 transition-colors border border-blue-200">
                          + Aggiungi all'Inventario
                        </button>
                      </form>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                      <div className="overflow-x-auto">
                        <table className="w-full text-left min-w-[500px]">
                          <thead className="bg-gray-50 text-gray-500 text-xs uppercase">
                            <tr><th className="p-3 font-medium">Articolo</th><th className="p-3 font-medium">Chi</th><th className="p-3 font-medium">Stato</th><th className="p-3 font-medium">Prezzo (€)</th><th className="p-3 font-medium"></th></tr>
                          </thead>
                          <tbody className="divide-y divide-gray-100">
                            {items.map(item => (
                              <tr key={item.id} className="hover:bg-gray-50">
                                <td className="p-3 font-medium text-sm">{item.desc}</td>
                                <td className="p-2">
                                  <select value={item.seller} onChange={(e) => updateItem(item.id, 'seller', e.target.value)} className="text-xs bg-transparent border-b border-gray-200 outline-none">
                                    <option>Nessuno</option><option>Nicolas</option><option>Veronica</option>
                                  </select>
                                </td>
                                <td className="p-2">
                                  <select value={item.status} onChange={(e) => updateItem(item.id, 'status', e.target.value)} className={`text-xs p-1 rounded font-medium outline-none ${item.status === 'Venduto' ? 'bg-green-100 text-green-700' : item.status === 'Da buttare' ? 'bg-gray-200 text-gray-600' : 'bg-blue-50 text-blue-600'}`}>
                                    <option>Da listare</option><option>In vendita</option><option>Venduto</option><option>Da buttare</option>
                                  </select>
                                </td>
                                <td className="p-2">
                                  <input type="number" value={item.price} onChange={(e) => updateItem(item.id, 'price', e.target.value)} className="w-16 p-1 border border-gray-200 rounded text-xs outline-none focus:border-indigo-500" />
                                </td>
                                <td className="p-3 text-right">
                                  <button onClick={() => deleteItem(item.id)} className="text-gray-400 hover:text-red-500"><Trash2 className="w-4 h-4"/></button>
                                </td>
                              </tr>
                            ))}
                            {items.length === 0 && <tr><td colSpan="5" className="p-4 text-center text-gray-500 text-sm">Nessun articolo registrato</td></tr>}
                          </tbody>
                        </table>
                      </div>
                    </div>

                  </div>
                </div>

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
